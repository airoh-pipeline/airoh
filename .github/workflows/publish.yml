name: publish

# build and publish the package to PyPI whenever a GitHub Release is published
on:
  release:
    types: [published]

# security: restrict permissions for CI jobs.
permissions:
  contents: read

jobs:
  # Build the sdist/wheel and upload them as an artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - run: python -m pip install build
      - run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Publish the built distributions to PyPI via Trusted Publishing (OIDC).
  # This is a separate job so that only this job has the necessary permissions.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/airoh
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
